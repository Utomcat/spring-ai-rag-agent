# Skills 配置
ai:
  skills:
    # 是否启用 Skills 功能
    enabled: true
    
    # Skills 配置文件路径(支持 classpath: 或 file: 前缀)
    registry-path: classpath:skills/
    
    # 是否自动发现并加载 Skills
    auto-discover: true
    
    # 最大并发执行数
    max-concurrent: 10
    
    # 单个 Skill 执行超时时间(秒)
    timeout-seconds: 60
    
    # 默认重试次数
    default-retries: 3
    
    # 是否启用异步执行
    async-enabled: true
    
    # 异步线程池大小
    async-pool-size: 5
