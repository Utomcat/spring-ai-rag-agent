spring:
  #关系型数据源配置
  datasource:
    #hikari连接池配置 - Spring Boot 4默认的连接池
    hikari:
      #HikariCP连接池配置
      driver-class-name: com.mysql.cj.jdbc.Driver
      #JDBC URL配置
      jdbc-url: jdbc:mysql://192.168.31.83:13309/knowledge_database_rag?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      #数据库用户名配置
      username: user
      #数据库密码配置
      password: 123456
      #是否注册JMX MBeans,开发环境建议设置为false,在开发时使用DevTools或其他热重载工具时,容易出现MBean重复注册,禁用JMX可以减少少量的性能开销;生产环境建议设置为true;
      register-mbeans: false
      #===虚拟线程场景下的连接池优化配置===
      # 连接池名称（便于监控）
      pool-name: VirtualThreadHikariPool
      # 最大连接数（从10提升到30，适配虚拟线程高并发）
      maximum-pool-size: 30
      # 最小空闲连接数
      minimum-idle: 10
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 空闲超时时间（毫秒）
      idle-timeout: 600000
      # 最大生命周期（毫秒）
      max-lifetime: 1800000
      # 泄漏检测阈值（毫秒）
      leak-detection-threshold: 60000
      # 连接测试查询
      connection-test-query: SELECT 1