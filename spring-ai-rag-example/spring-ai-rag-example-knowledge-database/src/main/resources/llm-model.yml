spring:
  # Spring AI 的配置
  ai:
    # 模型配置
    model:
      # 内嵌模型调用方式配置
      embedding: ollama
      # 聊天模型调用方式配置
      chat: openai
    # OpenAI 配置
    openai:
      # OpenAI API 密钥配置 - 小米 OpenAI API KEY 本地环境变量配置名 XIAOMI_MIMO_OPENAI_API_KEY; 百炼 OpenAI API KEY 本地环境变量配置名: DASHSCOPE_OPENAI_API_KEY;
      api-key: ${DASHSCOPE_OPENAI_API_KEY:""}
      # OpenAI 基础 URL 配置 - 小米 OpenAI Base URL: https://api.xiaomimimo.com/v1 ; 百炼 OpenAI Base URL: https://dashscope.aliyuncs.com/compatible-mode/v1;
      base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      # OpenAI 聊天模型配置
      chat:
        # 是否启用 OpenAI 聊天模型
        enabled: true
        # OpenAI 聊天模型配置 - 小米模型: mimo-v2.5-pro-ultraspeed; 百炼模型一: qwen3-vl-235b-a22b-thinking;
        model: "qwen3-vl-235b-a22b-thinking"
        # OpenAI 聊天模型超时配置
        timeout: 120s
      # OpenAI 内嵌模型配置
      embedding:
        # 是否启用 OpenAI 内嵌模型
        enabled: false
    # Ollama 配置
    ollama:
      # Ollama 基础 URL 配置${OLLAMA_BASE_URL:"http://localhost:11434"}
      base-url: "http://localhost:11434"
      # Ollama 聊天模型配置
      chat:
        # 是否启用 Ollama 聊天模型
        enabled: false
        # Ollama 聊天模型配置 ${OLLAMA_CHAT_MODEL:"phi4-mini:latest"}
        model: "phi4-mini:latest"
      # Ollama 内嵌模型配置
      embedding:
        # 是否启用 Ollama 内嵌模型
        enabled: true
        # Ollama 内嵌模型配置 ${OLLAMA_EMBEDDING_MODEL:"embeddinggemma:latest"}
        model: "embeddinggemma:latest"